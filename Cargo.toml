[package]
name = "charlotte"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
clap = { version = "4.6.0", features = ["derive"] }
crossterm = { version = "0.29.0", features = ["event-stream"] }
http-body-util = "0.1"
hyper = { version = "1.8.1", features = ["full"] }
hyper-util = { version = "0.1.19", features = ["full"] }
ratatui = "0.30"
rcgen = "0.14"
rustls = { version = "0.23.35", features = ["ring", "std"] }
thiserror = "2.0"
tokio = { version = "1.48.0", features = ["full"] }
tokio-rustls = "0"
tokio-stream = "0.1"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
